<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daring Money</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #050b1a; color: #e2e8f0; margin: 0; -webkit-tap-highlight-color: transparent; }
        .num-font { font-family: 'Tajawal', sans-serif; font-weight: 900; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s ease; }
        input, select { background: rgba(30, 41, 59, 0.5) !important; border: 1px solid rgba(71, 85, 105, 0.5) !important; color: white !important; }
    </style>
</head>
<body>

    <div id="copy-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl opacity-0 transition-all duration-500 z-[1000] pointer-events-none">
        ✅ تم النسخ بنجاح!
    </div>

    <nav id="nav" class="hidden glass-card sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex flex-col text-right">
            <h1 class="text-xl font-black text-white italic">DARING <span class="text-blue-500">MONEY</span></h1>
            <p id="user-welcome" class="text-[10px] text-emerald-400 font-bold italic"></p>
        </div>
        <button onclick="logout()" class="text-xs bg-red-500/10 text-red-500 px-4 py-2 rounded-xl border border-red-500/20 font-bold">خروج</button>
    </nav>

    <div id="dashboard-section" class="hidden max-w-4xl mx-auto p-4 space-y-6">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="glass-card p-4 rounded-2xl text-center border-b-2 border-blue-500">
                <p class="text-blue-400 text-[10px] font-black mb-1">أرباح اليوم</p>
                <h3 id="stat-today" class="num-font text-2xl">$0.00</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center">
                <p class="text-slate-400 text-[10px] font-black mb-1">إجمالي الأرباح</p>
                <h3 id="stat-total" class="num-font text-2xl">$0.00</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-b-2 border-emerald-500">
                <p class="text-emerald-400 text-[10px] font-black mb-1 underline">القابل للسحب</p>
                <h3 id="stat-withdrawable" class="num-font text-2xl text-emerald-400">$0.00</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center">
                <p class="text-purple-400 text-[10px] font-black mb-1">النقرات</p>
                <h3 id="stat-clicks" class="num-font text-2xl text-white">0</h3>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[2rem] border-r-4 border-blue-500">
            <h4 class="font-bold text-xs text-slate-300 mb-2 italic">🔗 رابطك الخاص</h4>
            <div class="flex bg-slate-950 rounded-2xl overflow-hidden border border-slate-800 p-1">
                <input type="text" id="ref-link" readonly class="bg-transparent px-3 flex-1 text-[11px] outline-none text-blue-300 font-bold">
                <button onclick="copyRef()" class="btn-primary px-6 py-2 rounded-xl text-xs font-black text-white">نسخ</button>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[2rem] border-r-4 border-emerald-500">
            <h4 class="font-bold text-sm text-emerald-400 mb-6 italic">💰 طلب سحب</h4>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="w-method" class="w-full p-4 rounded-2xl text-xs font-bold outline-none">
                        <option value="زين كاش">زين كاش</option>
                        <option value="رصيد آسيا">رصيد آسيا</option>
                        <option value="USDT">USDT (TRC20)</option>
                    </select>
                    <input type="text" id="w-account" placeholder="رقم الهاتف أو المحفظة" class="w-full p-4 rounded-2xl text-xs text-right font-bold outline-none">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="number" id="w-amount" placeholder="المبلغ (الأدنى 7$)" class="w-full p-4 rounded-2xl text-xs text-right font-bold outline-none">
                    <input type="text" id="w-contact" placeholder="يوزر التليجرام" class="w-full p-4 rounded-2xl text-xs text-right font-bold outline-none">
                </div>
                <button onclick="confirmWithdraw()" class="btn-primary w-full py-4 rounded-2xl font-black text-white shadow-lg active:scale-95">تأكيد السحب</button>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[2rem]">
            <h4 class="text-[10px] font-black mb-4 text-slate-500 uppercase tracking-widest italic">📋 سجل سحوباتك</h4>
            <div id="user-withdraw-history" class="space-y-3">
                <p class='text-[10px] text-slate-600 text-center py-4 italic'>جاري المزامنة...</p>
            </div>
        </div>
    </div>

    <div id="auth-section" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-md text-center border-t-4 border-blue-500">
            <h2 class="text-3xl font-black text-white italic mb-8">DARING <span class="text-blue-500">MONEY</span></h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="اسم المستخدم" class="hidden w-full p-4 rounded-2xl outline-none text-sm text-right">
                <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl outline-none text-sm text-left">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl outline-none text-sm text-left">
                <button onclick="handleAuth()" id="auth-btn" class="btn-primary w-full py-4 rounded-2xl font-black text-white">دخول</button>
                <p onclick="toggleAuthMode()" id="auth-switch" class="text-slate-500 text-xs font-bold cursor-pointer underline mt-4">سجل حساب جديد</p>
            </div>
        </div>
    </div>

    <div id="redirect-screen" class="hidden fixed inset-0 z-[10000] bg-[#050b1a] flex flex-col items-center justify-center p-6 text-center">
        <div class="relative w-16 h-16 mb-6">
            <div class="absolute inset-0 border-4 border-blue-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-blue-500 rounded-full animate-spin"></div>
        </div>
        <p class="text-slate-200 font-bold text-lg">جاري فحص الأمان...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
            authDomain: "my-dash-c78e3.firebaseapp.com",
            databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
            projectId: "my-dash-c78e3",
            storageBucket: "my-dash-c78e3.firebasestorage.app",
            messagingSenderId: "137154835768",
            appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const CLICK_PRICE = 0.02;
        const DEFAULT_LINK = "https://hp.funroom.store/a/8nw6emt2";

        let currentUserData = null;
        let isLoginMode = true;

        // دالة التصفير الساعة 3 فجراً
        function checkAndResetDaily(uid, data) {
            const now = new Date();
            let resetTime = new Date();
            resetTime.setHours(3, 0, 0, 0);
            
            // إذا كان الوقت الآن قبل الساعة 3 الفجر، نرجع يوم واحد للخلف للحساب الصحيح
            if (now.getHours() < 3) resetTime.setDate(resetTime.getDate() - 1);

            const lastReset = data.lastResetDate || 0;
            if (lastReset < resetTime.getTime()) {
                const todayProfit = data.todayBalance || 0;
                db.ref('users/' + uid).update({
                    todayBalance: 0,
                    withdrawableBalance: Number(((data.withdrawableBalance || 0) + todayProfit).toFixed(2)),
                    lastResetDate: Date.now()
                });
            }
        }

        function loadData(user) {
            // بيانات المروج
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val(); if (!d) return;
                currentUserData = d;
                checkAndResetDaily(user.uid, d);
                document.getElementById('stat-today').innerText = `$${(d.todayBalance || 0).toFixed(2)}`;
                document.getElementById('stat-total').innerText = `$${(d.totalBalance || 0).toFixed(2)}`;
                document.getElementById('stat-withdrawable').innerText = `$${(d.withdrawableBalance || 0).toFixed(2)}`;
                document.getElementById('stat-clicks').innerText = d.clicks || 0;
                document.getElementById('user-welcome').innerText = "أهلاً، " + d.username;
                document.getElementById('ref-link').value = window.location.origin + window.location.pathname + "?id=" + user.uid;
            });

            // سجل السحوبات - الحل المباشر
            db.ref('withdrawals').on('value', snap => {
                const list = document.getElementById('user-withdraw-history');
                const data = snap.val();
                list.innerHTML = "";

                if (!data) {
                    list.innerHTML = "<p class='text-[10px] text-slate-600 text-center py-4 italic'>لا يوجد سحوبات مسجلة.</p>";
                    return;
                }

                // فلترة يدوية فورية لضمان الظهور
                const myHistory = [];
                for (let key in data) {
                    if (data[key].uid === user.uid) {
                        myHistory.push({ id: key, ...data[key] });
                    }
                }

                if (myHistory.length === 0) {
                    list.innerHTML = "<p class='text-[10px] text-slate-600 text-center py-4 italic'>لا يوجد سحوبات مسجلة.</p>";
                    return;
                }

                // ترتيب الأحدث أولاً
                myHistory.sort((a, b) => b.timestamp - a.timestamp);

                myHistory.forEach(w => {
                    const statusText = w.status === 'paid' ? 'تم الدفع ✅' : 'قيد الانتظار ⏳';
                    const statusColor = w.status === 'paid' ? 'text-emerald-400' : 'text-amber-400';
                    list.innerHTML += `
                        <div class="flex justify-between items-center glass-card p-4 rounded-xl border border-slate-800 mb-2">
                            <div class="text-right">
                                <p class="num-font font-bold text-white text-lg">$${Number(w.amount).toFixed(2)}</p>
                                <p class="text-[9px] text-slate-500 font-bold">${w.method} | ${new Date(w.timestamp).toLocaleDateString()}</p>
                            </div>
                            <div class="text-[10px] font-bold ${statusColor} underline italic">${statusText}</div>
                        </div>`;
                });
            });
        }

        async function handleVisitor(id) {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const vIp = ipData.ip.replace(/\./g, '_');
                const ipRef = db.ref('ip_logs/' + id + '/' + vIp);
                const userRef = db.ref('users/' + id);
                const ipSnap = await ipRef.once('value');
                const now = Date.now();

                if (ipSnap.exists() && (now - ipSnap.val() < 86400000)) {
                    finalizeRedirect(userRef);
                } else {
                    await ipRef.set(now);
                    await userRef.transaction(d => {
                        if (d) {
                            d.clicks = (d.clicks || 0) + 1;
                            d.todayBalance = Number(((d.todayBalance || 0) + CLICK_PRICE).toFixed(2));
                            d.totalBalance = Number(((d.totalBalance || 0) + CLICK_PRICE).toFixed(2));
                            // القابل للسحب (withdrawableBalance) لا يزيد هنا، يزيد الساعة 3 الفجر فقط
                        }
                        return d;
                    });
                    finalizeRedirect(userRef);
                }
            } catch (e) { window.location.href = DEFAULT_LINK; }
        }

        async function finalizeRedirect(ref) {
            const snap = await ref.once('value');
            const link = (snap.val() && snap.val().marketingLink) ? snap.val().marketingLink : DEFAULT_LINK;
            setTimeout(() => { window.location.href = link; }, 2000);
        }

        function confirmWithdraw() {
            const amount = parseFloat(document.getElementById('w-amount').value);
            const method = document.getElementById('w-method').value;
            const account = document.getElementById('w-account').value;
            const contact = document.getElementById('w-contact').value;

            if (amount < 7 || isNaN(amount)) return alert("الحد الأدنى للسحب 7$");
            if (amount > (currentUserData.withdrawableBalance || 0)) return alert("رصيدك القابل للسحب لا يكفي حالياً.");

            db.ref('users/' + auth.currentUser.uid).transaction(d => {
                if (d) d.withdrawableBalance = Number((d.withdrawableBalance - amount).toFixed(2));
                return d;
            }).then(() => {
                db.ref('withdrawals').push({
                    uid: auth.currentUser.uid,
                    amount: amount,
                    method: method,
                    account: account,
                    contact: contact,
                    status: 'pending',
                    timestamp: Date.now()
                });
                alert("✅ تم إرسال طلب السحب بنجاح!\nسيظهر في السجل أدناه فوراً.");
                document.getElementById('w-amount').value = "";
            });
        }

        function copyRef() {
            const el = document.getElementById('ref-link');
            el.select();
            document.execCommand('copy');
            const toast = document.getElementById('copy-toast');
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 3000);
        }

        auth.onAuthStateChanged(u => {
            if (u) { showUI('dashboard-section'); loadData(u); }
            else { 
                const p = new URLSearchParams(window.location.search);
                if (p.get('id')) { document.getElementById('redirect-screen').classList.remove('hidden'); handleVisitor(p.get('id')); }
                else { showUI('auth-section'); }
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('password').value, n = document.getElementById('username').value;
            try {
                if (isLoginMode) await auth.signInWithEmailAndPassword(e, p);
                else {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref('users/' + r.user.uid).set({
                        username: n, email: e, clicks: 0, todayBalance: 0, totalBalance: 0, withdrawableBalance: 0, lastResetDate: Date.now()
                    });
                }
            } catch (err) { alert(err.message); }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('username').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-btn').innerText = isLoginMode ? "دخول" : "إنشاء حساب";
            document.getElementById('auth-switch').innerText = isLoginMode ? "سجل حساب جديد" : "لديك حساب؟ سجل دخول";
        }

        function showUI(id) {
            document.querySelectorAll('#auth-section, #dashboard-section, #nav').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'dashboard-section') document.getElementById('nav').classList.remove('hidden');
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
